name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-lint:
    runs-on: [self-hosted, linux, ARM64]
    container: php:8.2-cli-alpine
    steps:
      - uses: actions/checkout@v4
      - name: PHP Syntax Check
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

